<!--
  Gaffer UI — End of Season Awards Podium
  A stylised podium with trophy silhouette and confetti.
  Used as a decorative element behind the end-of-season screen.
  800x400, centered.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="podium-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9972e" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8b6214" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="trophy-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c25a" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#c9972e" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  <!-- Confetti -->
  <g fill="#e8c25a" opacity="0.15">
    <rect x="100" y="20" width="3" height="8" transform="rotate(15 100 20)" />
    <rect x="200" y="50" width="3" height="8" transform="rotate(-20 200 50)" />
    <rect x="300" y="30" width="3" height="8" transform="rotate(45 300 30)" />
    <rect x="500" y="40" width="3" height="8" transform="rotate(-10 500 40)" />
    <rect x="600" y="25" width="3" height="8" transform="rotate(30 600 25)" />
    <rect x="700" y="60" width="3" height="8" transform="rotate(-35 700 60)" />
    <rect x="150" y="80" width="2" height="6" transform="rotate(20 150 80)" />
    <rect x="350" y="90" width="2" height="6" transform="rotate(-15 350 90)" />
    <rect x="550" y="70" width="2" height="6" transform="rotate(40 550 70)" />
    <rect x="650" y="100" width="2" height="6" transform="rotate(-25 650 100)" />
  </g>
  <!-- Podium steps -->
  <rect x="300" y="280" width="200" height="80" fill="url(#podium-grad)" rx="2" />
  <rect x="200" y="310" width="100" height="50" fill="url(#podium-grad)" rx="2" opacity="0.7" />
  <rect x="500" y="310" width="100" height="50" fill="url(#podium-grad)" rx="2" opacity="0.7" />
  <!-- Trophy silhouette -->
  <g fill="url(#trophy-grad)" stroke="#e8c25a" stroke-width="1" opacity="0.4">
    <path d="M370 180 L430 180 L425 220 L375 220 Z" />
    <path d="M370 185 C350 185 345 200 345 215 C345 225 355 230 365 225" fill="none" />
    <path d="M430 185 C450 185 455 200 455 215 C455 225 445 230 435 225" fill="none" />
    <rect x="395" y="220" width="10" height="20" />
    <rect x="375" y="240" width="50" height="10" rx="1" />
  </g>
  <!-- Spotlight rays -->
  <g stroke="#e8c25a" stroke-width="0.5" opacity="0.08" fill="none">
    <line x1="400" y1="0" x2="300" y2="400" />
    <line x1="400" y1="0" x2="350" y2="400" />
    <line x1="400" y1="0" x2="400" y2="400" />
    <line x1="400" y1="0" x2="450" y2="400" />
    <line x1="400" y1="0" x2="500" y2="400" />
  </g>
</svg>
