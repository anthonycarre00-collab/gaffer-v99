<!--
  Gaffer UI — Player Profile Hero Background
  A subtle tactical formation dots pattern on dark background.
  Used behind the player profile hero card.
  800x200, slices horizontally.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="hero-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d3b25" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#0d3b25" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#0d3b25" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#hero-fade)" />
  <!-- Formation dots (4-3-3, faint) -->
  <g fill="#c9972e" opacity="0.06">
    <circle cx="150" cy="40" r="4" />
    <circle cx="300" cy="40" r="4" />
    <circle cx="500" cy="40" r="4" />
    <circle cx="650" cy="40" r="4" />
    <circle cx="250" cy="100" r="4" />
    <circle cx="400" cy="100" r="4" />
    <circle cx="550" cy="100" r="4" />
    <circle cx="200" cy="160" r="4" />
    <circle cx="400" cy="160" r="5" />
    <circle cx="600" cy="160" r="4" />
  </g>
  <!-- Connecting lines (faint) -->
  <g stroke="#c9972e" stroke-width="0.3" opacity="0.04" fill="none">
    <line x1="150" y1="40" x2="650" y2="40" />
    <line x1="250" y1="100" x2="550" y2="100" />
    <line x1="200" y1="160" x2="600" y2="160" />
    <line x1="400" y1="40" x2="400" y2="160" />
  </g>
</svg>
