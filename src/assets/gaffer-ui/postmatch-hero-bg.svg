<!--
  Gaffer UI — Post-Match Hero Banner Background
  A dramatic spotlight effect on dark pitch-green, with confetti particles
  for wins. Used as the background of the post-match result header.
  1200x300, slices horizontally.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#1a5d3a" stop-opacity="0.8" />
      <stop offset="40%" stop-color="#0d3b25" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#062018" stop-opacity="1" />
    </radialGradient>
    <linearGradient id="confetti-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c25a" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#e8c25a" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Dark base -->
  <rect width="1200" height="300" fill="#062018" />
  <!-- Spotlight -->
  <rect width="1200" height="300" fill="url(#spotlight)" />
  <!-- Confetti particles (scattered brass dots) -->
  <g fill="#e8c25a" opacity="0.3">
    <circle cx="120" cy="40" r="2" />
    <circle cx="280" cy="80" r="1.5" />
    <circle cx="440" cy="30" r="2" />
    <circle cx="620" cy="60" r="1.5" />
    <circle cx="780" cy="35" r="2" />
    <circle cx="920" cy="90" r="1.5" />
    <circle cx="1060" cy="50" r="2" />
    <circle cx="180" cy="130" r="1.5" />
    <circle cx="380" cy="160" r="2" />
    <circle cx="560" cy="140" r="1.5" />
    <circle cx="740" cy="180" r="2" />
    <circle cx="900" cy="150" r="1.5" />
    <circle cx="1020" cy="200" r="2" />
  </g>
  <!-- Subtle pitch lines at bottom -->
  <g stroke="#c9972e" stroke-width="0.5" opacity="0.1" fill="none">
    <line x1="0" y1="260" x2="1200" y2="260" />
    <line x1="0" y1="280" x2="1200" y2="280" />
  </g>
</svg>
