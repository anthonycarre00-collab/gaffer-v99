<!--
  Gaffer UI — Inbox Paper Texture
  A subtle paper-grain texture for the inbox message detail pane.
  Gives the feeling of reading a physical letter/memo.
  Tiles at 100x100.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <filter id="paper-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix values="0 0 0 0 0.92  0 0 0 0 0.88  0 0 0 0 0.82  0 0 0 0.04 0" />
    </filter>
  </defs>
  <rect width="100" height="100" filter="url(#paper-noise)" />
  <!-- Subtle horizontal lines (like ruled paper) -->
  <g stroke="#c9972e" stroke-width="0.15" opacity="0.06">
    <line x1="0" y1="25" x2="100" y2="25" />
    <line x1="0" y1="50" x2="100" y2="50" />
    <line x1="0" y1="75" x2="100" y2="75" />
  </g>
</svg>
