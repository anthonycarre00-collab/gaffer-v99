<!--
  Gaffer UI — Scouting Report Texture
  A subtle "dossier" feel — horizontal lines + a faint stamp circle.
  Applied to scouting report cards.
  200x200, tiles.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="dossier-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="1" stitchTiles="stitch" />
      <feColorMatrix values="0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0.03 0" />
    </filter>
  </defs>
  <rect width="200" height="200" filter="url(#dossier-noise)" />
  <!-- Horizontal file lines -->
  <g stroke="#c9972e" stroke-width="0.2" opacity="0.05">
    <line x1="20" y1="40" x2="180" y2="40" />
    <line x1="20" y1="80" x2="180" y2="80" />
    <line x1="20" y1="120" x2="180" y2="120" />
    <line x1="20" y1="160" x2="180" y2="160" />
  </g>
  <!-- Faint stamp circle (top right corner) -->
  <circle cx="170" cy="30" r="15" stroke="#c9972e" stroke-width="0.5" opacity="0.06" fill="none" />
  <text x="170" y="33" textAnchor="middle" fontSize="4" fill="#c9972e" opacity="0.06" font-family="sans-serif">SCOUT</text>
</svg>
