<!--
  Gaffer UI — Transfer Market Background
  A subtle schematic of football pitch zones with transfer arrows.
  Used as a faint background on the transfers tab.
  600x400, tiles.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="zone-grid" x="0" y="0" width="100" height="80" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="100" height="80" fill="none" stroke="#1a5d3a" stroke-width="0.3" opacity="0.06" />
      <line x1="50" y1="0" x2="50" y2="80" stroke="#1a5d3a" stroke-width="0.2" opacity="0.04" />
      <line x1="0" y1="40" x2="100" y2="40" stroke="#1a5d3a" stroke-width="0.2" opacity="0.04" />
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#zone-grid)" />
  <!-- Transfer arrows (faint) -->
  <g stroke="#c9972e" stroke-width="0.5" opacity="0.05" fill="none">
    <path d="M50 50 Q200 100 400 80" />
    <path d="M100 200 Q300 150 500 250" />
    <path d="M200 350 Q350 300 550 320" />
  </g>
</svg>
